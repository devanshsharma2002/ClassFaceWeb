{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>🔍 Process Classroom Photo</h1>
    <form action="/detect" method="post" enctype="multipart/form-data">
        <input type="file" name="classroom_photo" accept="image/*" required>
        <button type="submit">Process Photo</button>
    </form>
    
    {% if results %}
    <h3>Results:</h3>
    <p>{{ results.total_faces_detected }} faces detected</p>
    {% for student in results.attendance %}
    <div>{{ student.name }} - {{ student.confidence }}</div>
    {% endfor %}
    {% endif %}
</div>
{% endblock %}
